    <div class="container">
        <div class="header-bar">
            <a class="logo" href="/" aria-label="АВАЮССТРОЙ - на главную">
                <img src="/static/images/logo.svg" alt="Логотип АВАЮССТРОЙ">

                </span>
            </a>
        </div>
        <div class="header-panel">
            <nav class="nav" aria-label="Основная навигация">
                <a href="/">Главная</a>
                <a href="/services">Услуги</a>

<div id="phoneFormModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="phoneFormTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
        <button type="button" class="close" aria-label="Закрыть форму">&times;</button>
        <p class="modal-eyebrow">Быстрая связь</p>
        <h3 id="phoneFormTitle">Оставьте заявку, и мы свяжемся с вами</h3>
        <p class="modal-description">Подскажем по стоимости, срокам и подберем решение под ваш объект.</p>
        <form id="contactForm">
            <input type="text" id="name" name="name" placeholder="Ваше имя" autocomplete="name" required>
            <input type="tel" id="phone" name="phone" placeholder="Ваш телефон" inputmode="tel" autocomplete="tel" required>
            <button type="submit" class="cta-button">
                <span class="submit-text">Отправить заявку</span>
                <span class="loading-spinner" style="display: none;">...</span>
            </button>
        </form>
        <p id="responseMessage" role="status" aria-live="polite"></p>
    </div>
</div>

<div class="phone-button">
    <button class="phone-icon" id="openPhoneForm" type="button" aria-label="Открыть форму обратного звонка">
        <img src="/static/images/phone-icon.svg" alt="Иконка телефона">
    </button>
</div>
{{ end }}
