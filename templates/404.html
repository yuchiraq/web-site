<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    {{ template "head" }}
    <title>404 - Страница не найдена | ЧСУП «АВАЮССТРОЙ»</title>
    <meta name="description" content="Страница не найдена. Вернитесь на главную страницу сайта ЧСУП «АВАЮССТРОЙ», чтобы найти информацию об инженерных и строительных услугах в Бресте.">
</head>
<body>
    {{ template "header" }}

    <main>
        <section class="error-hero">
            <div class="container error-hero__content" data-aos="fade-up">
                <span class="error-hero__code">404</span>
                <h1>Страница не найдена</h1>
                <p>Похоже, ссылка устарела или страница была перемещена. Давайте быстро вернемся к нужным разделам сайта.</p>
                <div class="error-hero__actions">
                    <a href="/" class="cta-button">На главную</a>
                    <a href="/services" class="service-button">Посмотреть услуги</a>
                </div>
            </div>
        </section>
    </main>

    {{ template "footer" }}
</body>
</html>
